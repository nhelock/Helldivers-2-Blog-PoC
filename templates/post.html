{% extends "index.html" %}

{% block content %}
<article class="post-full">
    <header class="post-header">
        <h1 class="post-title">{{ post.title }}</h1>
        {% if post.subtitle %}
            <p class="post-subtitle">{{ post.subtitle }}</p>
        {% endif %}
        <div class="post-meta">
            <span class="post-category">Category: {{ post.category|capitalize }}</span>
            {% if post.timestamp %}
            <span class="post-date">Posted: {{ post.timestamp.strftime('%B %d, %Y') }}</span>
            {% endif %}
        </div>
    </header>
    
    <div class="post-content">
        {{ post.content_html }}
    </div>
    
    <footer class="post-footer">
        <a href="javascript:history.back()" class="back-link">← Back</a>
    </footer>
</article>
{% endblock %}
