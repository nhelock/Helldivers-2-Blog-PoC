{% extends "index.html" %}

{% block content %}
<article class="post-full">
    <header class="post-header">
        <h1 class="post-title">{{ post.title }}</h1>
        <div class="post-meta">
            <span class="post-category">Category: {{ post.category|capitalize }}</span>
            {% if post.timestamp %}
            <span class="post-date">Posted: {{ post.timestamp.strftime('%B %d, %Y') }}</span>
            {% endif %}
        </div>
    </header>
    
    <div class="post-content">
        {{ post.content_html }}
    </div>
    
    <footer class="post-footer">
        <a href="/" class="back-link">← Back to Home</a>
    </footer>
</article>
{% endblock %}
