{% extends "index.html" %}

{% block content %}
    {% if posts %}
        {% for post in posts %}
        <div class="post">
            <h2 class="post-title">{{ post.title }}</h2>
            {% if post.subtitle %}
                <p class="post-subtitle">{{ post.subtitle }}</p>
            {% endif %}
            <a href="/post/{{ post.id }}" class="read-more">Read More →</a>
        </div>
        {% endfor %}
    {% else %}
        <p class="no-posts">No posts yet.</p>
    {% endif %}
{% endblock %}
