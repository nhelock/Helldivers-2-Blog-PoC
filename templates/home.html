<!DOCTYPE html>
<html>
<head>
    <title>My Flask Blog</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 0 auto; padding: 20px; }
        .post { border: 1px solid #ddd; margin: 20px 0; padding: 20px; border-radius: 5px; }
        a { color: blue; text-decoration: none; }
        button { background: blue; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>My Blog</h1>
    <a href="/create"><button>Create New Post</button></a>
    
    {% if posts %}
        {% for post in posts %}
        <div class="post">
            <h2>{{ post.title }}</h2>
            <p>{{ post.content[:200] }}...</p>
            <a href="/post/{{ post.id }}">Read More</a>
        </div>
        {% endfor %}
    {% else %}
        <p>No posts yet. Create your first post!</p>
    {% endif %}
</body>
</html>
